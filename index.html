<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Upad...</title>
    <style>
        :root {
            --primary: #00ff41;
            --danger: #ff003c;
            --mcdonalds: #ffbc0d;
            --bg: #050505;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); 
            font-family: 'Segoe UI', 'Courier New', monospace; 
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.4; }

        .ui-layer {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--primary); text-align: center;
        }

        .terminal-window {
            background: rgba(0, 15, 0, 0.95);
            border: 2px solid var(--primary);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
            padding: 30px; width: 90%; max-width: 480px; border-radius: 10px;
        }

        .intro-text {
            font-size: 1.4em; font-weight: 800; margin-bottom: 20px;
            color: var(--primary); text-transform: uppercase;
        }

        .mek-style { color: var(--mcdonalds); text-shadow: 0 0 10px rgba(255, 188, 13, 0.8); }

        .label { font-size: 0.75em; display: block; margin-bottom: 5px; text-align: left; }
        
        .progress-bar {
            width: 100%; height: 10px; background: #001a00;
            border-radius: 5px; margin-bottom: 12px; overflow: hidden;
            border: 1px solid var(--primary);
        }

        .fill {
            height: 100%; background: var(--primary); width: 0%;
            box-shadow: 0 0 10px var(--primary); transition: width 0.3s linear;
        }

        #timer {
            font-size: 4.5em; color: var(--danger); font-weight: 900;
            text-shadow: 0 0 25px var(--danger); margin: 15px 0;
        }

        #abort-btn {
            background: var(--danger); color: white; border: none;
            padding: 18px 45px; font-size: 1.3em; font-weight: bold;
            cursor: pointer; border-radius: 10px; text-transform: uppercase;
            animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(2px, 0); }
            50% { transform: translate(-2px, 0); }
            100% { transform: translate(0, 2px); }
        }

        #love-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }

        .love-content {
            background: rgba(0, 0, 0, 0.95); padding: 40px;
            border: 3px solid #ff3366; border-radius: 25px;
            box-shadow: 0 0 50px #ff3366; text-align: center;
        }

        .heart { font-size: 100px; animation: beat 0.4s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
    </style>
</head>
<body>

    <audio id="siren" loop>
        <source src="https://www.soundjay.com/misc/sounds/ambulance-siren-01.mp3" type="audio/mpeg">
    </audio>

    <canvas id="matrix"></canvas>

    <div id="hacked-ui" class="ui-layer">
        <div class="terminal-window" id="window">
            <div class="intro-text">
                Ja sam Milutin<br>
                Radio sam 4 godine u <span class="mek-style">Mek-u</span>
            </div>
            
            <h2 style="font-size: 0.9em; letter-spacing: 2px; margin-bottom: 20px;">BRISANJE PODATAKA...</h2>
            
            <div class="progress-section">
                <span class="label">KONTAKTI: <span id="p1-txt">0%</span></span>
                <div class="progress-bar"><div id="b1" class="fill"></div></div>
                
                <span class="label">GALERIJA: <span id="p2-txt">0%</span></span>
                <div class="progress-bar"><div id="b2" class="fill"></div></div>
                
                <span class="label">SMS I VIBER: <span id="p3-txt">0%</span></span>
                <div class="progress-bar"><div id="b3" class="fill"></div></div>
            </div>

            <div id="timer">10</div>
            <button id="abort-btn">ZAUSTAVI BRISANJE</button>
        </div>
    </div>

    <div id="love-screen">
        <div class="love-content">
            <div class="heart">❤️</div>
            <h1 style="color: #ff3366; font-size: 2.5em; margin-top: 20px;">ŠALIM SE!</h1>
            <p style="color: white; font-size: 1.6em; font-weight: bold;">Hakovano je moje srce !</p>
        </div>
    </div>

    <script>
        const siren = document.getElementById('siren');
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const characters = "01010101";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // Progress bars animacija
        function updateBar(id, txtId, speed) {
            let width = 0;
            let interval = setInterval(() => {
                if (width >= 100) clearInterval(interval);
                else {
                    width += 1;
                    document.getElementById(id).style.width = width + '%';
                    document.getElementById(txtId).innerText = width + '%';
                }
            }, speed);
        }

        updateBar('b1', 'p1-txt', 60);
        updateBar('b2', 'p2-txt', 90);
        updateBar('b3', 'p3-txt', 40);

        // Tajmer i "Panika"
        let timeLeft = 10;
        const timerElement = document.getElementById('timer');
        const windowElement = document.getElementById('window');
        
        let countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            if(timeLeft <= 3) windowElement.classList.add('shake');
            if(timeLeft <= 0) {
                clearInterval(countdown);
                triggerLove();
            }
        }, 1000);

        // KLJUČNI DEO: Sirena kreće na klik dugmeta
        document.getElementById('abort-btn').onclick = triggerLove;

        function triggerLove() {
            clearInterval(countdown);
            
            // Pokretanje sirene u momentu prelaska
            siren.play().catch(e => console.log("Audio play blocked by browser. Click anywhere first!"));
            
            document.getElementById('hacked-ui').style.display = 'none';
            document.getElementById('love-screen').style.display = 'flex';
            
            // Menjamo matrix u crvenu boju za srce
            ctx.fillStyle = "#ff3366";
        }
    </script>
</body>
</html>
