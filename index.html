<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Upad...</title>
    <style>
        :root {
            --primary: #00ff41;
            --danger: #ff003c;
            --mcdonalds: #ffbc0d;
            --bg: #050505;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: var(--bg); 
            font-family: 'Segoe UI', 'Courier New', monospace; 
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.6; }

        .ui-layer {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--primary); text-align: center;
        }

        .terminal-window {
            background: rgba(0, 20, 0, 0.95);
            border: 2px solid var(--primary);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.3);
            padding: 30px; width: 90%; max-width: 500px; border-radius: 8px;
        }

        .intro-text {
            font-size: 1.4em; font-weight: 800; margin-bottom: 20px;
            line-height: 1.3; color: var(--primary); text-transform: uppercase;
        }

        .mek-style { color: var(--mcdonalds); text-shadow: 0 0 10px rgba(255, 188, 13, 0.6); font-weight: bold; }

        .progress-section { margin: 15px 0; text-align: left; }
        .label { font-size: 0.75em; margin-bottom: 5px; display: block; font-weight: bold; }
        
        .progress-bar {
            width: 100%; height: 10px; background: #001a00;
            border-radius: 5px; margin-bottom: 12px; overflow: hidden;
            border: 1px solid var(--primary);
        }

        .fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s linear; }

        #timer {
            font-size: 4em; color: var(--danger); font-weight: 900;
            text-shadow: 0 0 20px var(--danger); margin: 10px 0;
        }

        #abort-btn {
            background: var(--danger); color: white; border: none;
            padding: 18px 45px; font-size: 1.4em; font-weight: bold;
            cursor: pointer; border-radius: 10px; animation: pulse 0.8s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.05); } }
        .shake { animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(2px, 0); } 50% { transform: translate(-2px, 0); } 100% { transform: translate(0, 2px); } }

        #love-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }

        .love-content {
            background: rgba(0, 0, 0, 0.95); padding: 40px; border: 3px solid #ff3366;
            border-radius: 25px; box-shadow: 0 0 40px #ff3366; text-align: center;
        }

        .heart { font-size: 100px; animation: beat 0.4s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
    </style>
</head>
<body onclick="initAudio()">

    <canvas id="matrix"></canvas>

    <div id="hacked-ui" class="ui-layer">
        <div class="terminal-window" id="window">
            <div class="intro-text">
                Ja sam Milutin<br>
                Radio sam 4 godine u <span class="mek-style">Mek-u</span>
            </div>
            
            <h1 style="font-size: 1em; letter-spacing: 3px; opacity: 0.7;">SYSTEM OVERRIDE</h1>
            
            <div class="progress-section">
                <span class="label">PRISTUP KONTAKTIMA: <span id="p1-txt">0%</span></span>
                <div class="progress-bar"><div id="b1" class="fill"></div></div>
                
                <span class="label">DOWNLOAD GALERIJE: <span id="p2-txt">0%</span></span>
                <div class="progress-bar"><div id="b2" class="fill"></div></div>
                
                <span class="label">BRISANJE PODATAKA: <span id="p3-txt">0%</span></span>
                <div class="progress-bar"><div id="b3" class="fill"></div></div>
            </div>

            <div id="timer">10</div>
            <button id="abort-btn">ZAUSTAVI BRISANJE</button>
        </div>
    </div>

    <div id="love-screen">
        <div class="love-content">
            <div class="heart">❤️</div>
            <h1 style="color: #ff3366; font-size: 2.5em; margin-top: 20px;">ŠALIM SE!</h1>
            <p style="color: white; font-size: 1.6em; font-weight: bold;">Hakovano je moje srce !</p>
        </div>
    </div>

    <script>
        // GENERATOR SIRENE (Audio Context)
        let audioCtx = null;
        let oscillator = null;
        let sirenInterval = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function startSiren() {
            initAudio();
            if (oscillator) return;

            oscillator = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();

            oscillator.type = 'square'; // Prodorniji zvuk
            oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            // Efekat zavijanja sirene
            sirenInterval = setInterval(() => {
                let time = audioCtx.currentTime;
                oscillator.frequency.exponentialRampToValueAtTime(880, time + 0.5);
                oscillator.frequency.exponentialRampToValueAtTime(440, time + 1.0);
            }, 1000);
        }

        function stopSiren() {
            if (oscillator) {
                oscillator.stop();
                oscillator = null;
                clearInterval(sirenInterval);
            }
        }

        // Matrix
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.height = window.innerHeight; canvas.width = window.innerWidth;
        const characters = "01";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // Progress
        function updateBar(id, txtId, dur, cb) {
            let w = 0;
            let int = setInterval(() => {
                if (w >= 100) { clearInterval(int); if(cb) cb(); }
                else { w++; document.getElementById(id).style.width = w + '%'; document.getElementById(txtId).innerText = w + '%'; }
            }, dur);
        }

        updateBar('b1', 'p1-txt', 40, () => {
            updateBar('b2', 'p2-txt', 30, () => {
                updateBar('b3', 'p3-txt', 60);
            });
        });

        // Timer
        let timeLeft = 10;
        let countdown = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if(timeLeft <= 3) document.getElementById('window').classList.add('shake');
            if(timeLeft <= 0) triggerLove();
        }, 1000);

        // Okidač za sirenu i srce
        document.getElementById('abort-btn').onclick = () => {
            startSiren();
            triggerLove();
        };

        function triggerLove() {
            clearInterval(countdown);
            document.getElementById('hacked-ui').style.display = 'none';
            document.getElementById('love-screen').style.display = 'flex';
            // Menjamo boju matrixa u crvenu za srce
            ctx.fillStyle = "#ff3366";
        }
    </script>
</body>
</html>
