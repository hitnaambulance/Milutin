<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: black; font-family: 'Courier New', monospace; cursor: pointer; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #0F0; width: 85%; z-index: 5; text-shadow: 0 0 8px #0F0; }
        #status-box { width: 100%; border: 1px solid #0F0; padding: 15px; text-align: left; background: rgba(0, 10, 0, 0.9); }
        .status-item { margin-bottom: 12px; display: flex; flex-direction: column; font-size: 0.85em; }
        .bar-container { width: 100%; height: 12px; background: #002200; border: 1px solid #0F0; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; background: #0F0; width: 0%; box-shadow: 0 0 10px #0F0; }
        .status-header { display: flex; justify-content: space-between; }
        #countdown { font-size: 5em; color: red; margin: 15px 0; text-shadow: 0 0 15px red; }
        #stop-btn { background: red; color: white; border: none; padding: 20px 50px; font-size: 2em; font-weight: bold; border-radius: 15px; cursor: pointer; animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.1); } }
        #joke-screen { display: none; opacity: 0; transition: opacity 1s; }
        #heart { font-size: 80px; color: red; animation: beat 0.5s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
        .melt { animation: melt 1.5s forwards; }
        @keyframes melt { 100% { transform: translate(-50%, 150vh); opacity: 0; } }
    </style>
</head>
<body onclick="pokreniSve()">

    <canvas id="c"></canvas>

    <div id="hacked" class="container">
        <h1>Ćao, ja sam Milutin :)</h1>
        <p style="font-size: 0.9em; color: lime;">Sistem kompromitovan. Čišćenje podataka...</p>
        
        <div id="status-box">
            <div class="status-item">
                <div class="status-header"><span>Kontakti: brisanje</span><span id="p1">0%</span></div>
                <div class="bar-container"><div id="b1" class="bar-fill"></div></div>
            </div>
            <div class="status-item">
                <div class="status-header"><span>SMS, Viber, WhatsApp: brisanje</span><span id="p2">0%</span></div>
                <div class="bar-container"><div id="b2" class="bar-fill"></div></div>
            </div>
            <div class="status-item">
                <div class="status-header"><span>Aplikacija banke: transfer novca</span><span id="p3">0%</span></div>
                <div class="bar-container"><div id="b3" class="bar-fill"></div></div>
            </div>
        </div>

        <div id="countdown">10</div>
        <button id="stop-btn">STOP</button>
    </div>

    <div id="joke-screen" class="container">
        <h1 style="color: #ff9a9e;">ŠALIM SE!</h1>
        <p style="color: white;">Jedina stvar koja je hakovana je moje srce</p>
        <div id="heart">❤</div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const siren = new Audio('siren.mp3'); 
        let aktivirano = false;

        function resize() { canvas.height = window.innerHeight; canvas.width = window.innerWidth; }
        window.onresize = resize;
        resize();

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let drops = Array.from({length: columns}).map(() => Math.random() * -100);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        function pokreniSve() {
            if (!aktivirano) {
                // Budimo audio
                siren.play().then(() => { siren.pause(); siren.currentTime = 0; }).catch(e => console.log("Audio block"));
                
                // Krećemo Matrix i barove
                setInterval(draw, 35);
                fillBar("b1", "p1", 50, () => fillBar("b2", "p2", 40, () => fillBar("b3", "p3", 80)));
                
                // Tajmer
                let time = 10;
                let tInv = setInterval(() => {
                    time--; 
                    document.getElementById("countdown").innerText = time;
                    if(time <= 0) clearInterval(tInv);
                }, 1000);
                
                aktivirano = true;
            }
        }

        function fillBar(id, pid, speed, next) {
            let p = 0;
            let inv = setInterval(() => {
                p += 1; if(p > 100) p = 100;
                document.getElementById(id).style.width = p + "%";
                document.getElementById(pid).innerText = p + "%";
                if(p >= 100) { clearInterval(inv); if(next) next(); }
            }, speed);
        }

        document.getElementById("stop-btn").onclick = function(e) {
            e.stopPropagation();
            siren.play(); 
            document.getElementById("hacked").classList.add("melt");
            setTimeout(() => {
                document.getElementById("hacked").style.display = "none";
                document.getElementById("joke-screen").style.display = "block";
                setTimeout(() => { document.getElementById("joke-screen").style.opacity = "1"; }, 100);
            }, 1500);
        };
    </script>
</body>
</html>
